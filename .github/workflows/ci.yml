name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  node-governance:
    name: Node governance checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root dev dependencies
        run: npm ci
      - name: Repo governance scripts
        run: npm run check
      - name: Hermes control API tests
        # control:test excludes the swarm-contract suite: it validates the
        # operator machine's .hermes/state.json, which never exists in CI.
        run: npm run control:test

  command-center-site:
    name: Private Command Center source
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/ghostclaw-hermes-v3-command-center
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: sites/ghostclaw-hermes-v3-command-center/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Build deployable output
        run: npm run build
      - name: Verify rendering, auth, and leak boundaries
        run: npm test
      - name: Lint and typecheck
        run: npm run lint && npm run typecheck
