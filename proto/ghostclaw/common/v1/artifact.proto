syntax = "proto3";

package ghostclaw.common.v1;

option go_package = "github.com/sirinx/ghostclaw-common/proto/ghostclaw/common/v1;commonv1";

message ArtifactIdentity {
  string id = 1;
  string run_id = 2;
  string mission_id = 3;
  string kind = 4;
  string content_type = 5;
}

message ArtifactDigest {
  string algorithm = 1;
  string value = 2;
}

message Artifact {
  ArtifactIdentity identity = 1;
  bytes payload = 2;
  ArtifactDigest digest = 3;
  string created_at = 4;
  string content_ref = 5;
}
