<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIRINX | Solar Carport, BESS, EV Charging และ AI EMS สำหรับธุรกิจไทย</title>
  <meta name="description" content="SIRINX แพลตฟอร์มพลังงานสะอาดสำหรับองค์กรและผู้ประกอบการไทย — Solar Rooftop, Solar Carport, BESS, EV Charging และ AI Energy Management" />
  <link rel="canonical" href="https://www.sirinx.co/" />
  <meta name="theme-color" content="#0A0F1C" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0A0F1C;
      --line: rgba(148, 163, 184, 0.18);
      --sirinx-cyan: #06B6D4;
      --solar-amber: #F59E0B;
      --white: #FFFFFF;
      --muted: #94A3B8;
      --soft: #CBD5E1;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at 10% 0%, rgba(6, 182, 212, 0.18), transparent 32rem),
        radial-gradient(circle at 92% 6%, rgba(245, 158, 11, 0.16), transparent 34rem),
        linear-gradient(180deg, #050914 0%, var(--bg) 36%, #070B14 100%);
      color: var(--white);
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main { max-width: 760px; text-align: center; }
    .wordmark { font-weight: 950; letter-spacing: -0.05em; font-size: clamp(2.4rem, 8vw, 4.6rem); margin: 0 0 8px; }
    .wordmark span { color: var(--sirinx-cyan); }
    h1 { font-size: clamp(1.2rem, 3vw, 1.7rem); font-weight: 800; color: var(--soft); margin: 0 0 22px; }
    p { color: var(--muted); margin: 0 0 30px; }
    .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-flex; align-items: center; min-height: 46px; padding: 0 20px;
      border-radius: 999px; text-decoration: none; font-weight: 850; color: #06121e;
      background: linear-gradient(135deg, var(--sirinx-cyan), #38BDF8);
    }
    a.btn.ghost { background: rgba(255,255,255,.06); color: var(--white); border: 1px solid var(--line); }
  </style>
</head>
<body>
  <main>
    <div class="wordmark">SIRINX<span>.CO</span></div>
    <h1>พลังงานสะอาดครบวงจรสำหรับธุรกิจไทย — Solar • BESS • EV Charging • AI EMS</h1>
    <p>แพลตฟอร์มพลังงานอัจฉริยะที่ขับเคลื่อนด้วยระบบ AI Agent สำหรับโรงงาน คลังสินค้า โรงแรม และผู้ประกอบการ SME</p>
    <div class="links">
      <a class="btn" href="/thaimart-sirinx">Thaimart x SIRINX</a>
      <a class="btn ghost" href="/api/packages">ดูแพ็กเกจ (API)</a>
    </div>
  </main>
</body>
</html>
